services:
  - type: web
    name: ema-pro-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FINNHUB_KEY
        value: YOUR_FINNHUB_KEY_HERE
    healthCheckPath: /api/health
